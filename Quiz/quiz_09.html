<html>
<head>
    <title>quiz</title>
</head>
<body>
    <script>

        function solution(need, plan){
            let queue = need.split("");

            for(let x of plan){
                if(queue.includes(x)){
                    if(queue.shift() !== x){
                        return "No";
                    }
                }
            }

            return queue.length === 0 ? "Yes" : "No";
        }

        let a = "CBA";
        let b = "CBDAGE"; // yes
        // let b = "CBDGE"; // no
        // let b = "CADBGE"; // no

        console.log(solution(a,b));

    </script>
</body>
</html>
