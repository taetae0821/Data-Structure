<html>
<head>
    <title>quiz</title>
</head>
<body>
    <script>

        function solution(n, k){
            let queue = [];

            for(let i = 1; i <= n; i++){
                queue.push(i);
            }

            while(queue.length !== 1){

                for(let i = 1; i < k; i++){
                    queue.push(queue.shift());
                }

                queue.shift();
            }

            return queue.shift;
        }

        console.log(solution(8,3));

    </script>
</body>
</html>
