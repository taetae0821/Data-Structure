<body>
    <script>

        function solution(s){
            let answer = 0;
            let stack =[];
            
            for(let x of s){
                if(!isNaN(x)){
                    stack.push(Number(x));
                }else{
                   let rt = stack.pop();
                   let lt =  stack.pop();

                    if(x ==="+") stack.push(lt + rt);
                    if(x ==="-") stack.push(lt - rt);
                    if(x ==="*") stack.push(lt * rt);
                    if(x ==="/") stack.push(lt / rt);

                }
            }

            return answer = stack.pop();
        }
         let str = "352+*9-"
        //let str = "35-7*62/+"";
        console.log(solution(str));

    </script>
</body>
