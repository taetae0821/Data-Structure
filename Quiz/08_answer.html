<body>
    <script>

        function solution(n, k){
            let answer = 0;
            //let queue = [];
            //insert Code
            //for(let i = 0; i<n; i++) queue.push(i+1);

            let queue = Array.from({length:n},(v,i) => 1); 

            // let prince = queue.shift();
            // queue.push(prince);

            while(queue.length){

                for(let i=1; i<k; i++) queue.push(queue.shift());
                queue.shift();

                if(queue.length === 1) answer = queue.shift();
            }

            return answer;
        }
        
        console.log(solution(8, 3));

    </script>
</body>
