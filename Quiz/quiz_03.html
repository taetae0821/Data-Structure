<body>
    <script>

        function solution(arr){
            let answer = 0;
            let count = 0;
    
            //insert Code
            for(let i=0; i<arr.length; i++){
                if(arr[i] === 1){
                    count++;
                }else{
                    count = 0;
                }
                answer += count;
            }

            return answer;
        }
         let arr = [1,0,1,1,1,0,0,1,1,0];
        console.log(solution(arr))
       

    </script>
